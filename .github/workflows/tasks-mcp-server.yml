name: tasks-mcp-server

on:
  push:
    branches: [main]
    paths:
      - "tasks-mcp-server/**"
      - ".github/workflows/tasks-mcp-server.yml"

env:
  IMAGE: ghcr.io/irfanmanzoor12/32n/tasks-mcp-server

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # to commit the updated manifest back
      packages: write   # to push to ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: tasks-mcp-server/
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Pin SHA in deployment manifest
        run: |
          sed -i \
            "s|image: ${{ env.IMAGE }}:.*|image: ${{ env.IMAGE }}:${{ github.sha }}|" \
            deployment/tasks-mcp-server/deployment.yaml

      - name: Commit updated manifest
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: deploy tasks-mcp-server@${{ github.sha }}"
          file_pattern: deployment/tasks-mcp-server/deployment.yaml
